name: Build Windows .exe

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller twain

      - name: Smoke test (imports + DB init)
        run: |
          python -c "import database, audit_log, backup, pdf_report, odontogram; database.init_db(); audit_log.init_audit_table(); print('OK')"

      - name: Build executable
        run: pyinstaller --noconfirm --clean trident.spec

      - name: Package as zip
        run: Compress-Archive -Path dist\TridentDentalImaging\* -DestinationPath TridentDentalImaging-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TridentDentalImaging-windows
          path: TridentDentalImaging-windows.zip
          retention-days: 30

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TridentDentalImaging-windows.zip
